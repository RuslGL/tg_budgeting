services:
  bot:
    build: .
    env_file: .env
    environment:
      COMPANY: family
      CATEGORIES_SHEET: categories
    restart: unless-stopped

  bot_corp:
    build: .
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN_CORP}
      COMPANY: business
      CATEGORIES_SHEET: corp_categories
    command: python bot_corp_main.py
    restart: unless-stopped

  bot_notes:
    build: .
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN_NOTES}
    command: python bot_notes_main.py
    restart: unless-stopped

  bot_calories:
    build: .
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN_CALORIES}
      FOOD_DB_PATH: /data/food.db
    command: python bot_calories_main.py
    volumes:
      - food_cache:/data
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - dashboard_data:/data
    restart: unless-stopped

volumes:
  dashboard_data:
  food_cache:
