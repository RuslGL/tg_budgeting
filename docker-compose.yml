services:
  bot:
    build: .
    env_file: .env
    environment:
      COMPANY: family
      CATEGORIES_SHEET: categories
    restart: unless-stopped

  bot_corp:
    build: .
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN_CORP}
      COMPANY: business
      CATEGORIES_SHEET: corp_categories
    command: python bot_corp_main.py
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - dashboard_data:/data
    restart: unless-stopped

volumes:
  dashboard_data:
