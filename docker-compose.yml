services:
  bot:
    build: .
    env_file: .env
    environment:
      COMPANY: family
      CATEGORIES_SHEET: categories
      HTTP_PROXY: ${PROXY_URL}
      HTTPS_PROXY: ${PROXY_URL}
    network_mode: host
    restart: unless-stopped

  bot_corp:
    build: .
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN_CORP}
      COMPANY: business
      CATEGORIES_SHEET: corp_categories
      HTTP_PROXY: ${PROXY_URL}
      HTTPS_PROXY: ${PROXY_URL}
    command: python bot_corp_main.py
    network_mode: host
    restart: unless-stopped

  bot_notes:
    build: .
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN_NOTES}
      HTTP_PROXY: ${PROXY_URL}
      HTTPS_PROXY: ${PROXY_URL}
    command: python bot_notes_main.py
    network_mode: host
    restart: unless-stopped

  bot_calories:
    build: .
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN_CALORIES}
      FOOD_DB_PATH: /data/food.db
      HTTP_PROXY: ${PROXY_URL}
      HTTPS_PROXY: ${PROXY_URL}
    command: python bot_calories_main.py
    volumes:
      - food_cache:/data
    network_mode: host
    restart: unless-stopped

  bot_assistant:
    build: .
    env_file: .env
    environment:
      HTTP_PROXY: ${PROXY_URL}
      HTTPS_PROXY: ${PROXY_URL}
    command: python personal_assistant/main.py
    network_mode: host
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    env_file: .env
    environment:
      HTTP_PROXY: ${PROXY_URL}
      HTTPS_PROXY: ${PROXY_URL}
    volumes:
      - dashboard_data:/data
    network_mode: host
    restart: unless-stopped

volumes:
  dashboard_data:
  food_cache:
